<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather Forecast Application</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body
    id="appBody"
    class="relative min-h-screen  bg-gradient-to-br from-sky-700 to-slate-600 flex items-center justify-center p-6 transition-all duration-500 overflow-hidden "
  >
    <div
     id="weatherPattern"
class="absolute inset-0 pointer-events-none text-3xl hidden z-0"
    ></div>
    <div
      class="w-full max-w-4xl bg-white/85 backdrop-blur-sm rounded-2xl shadow-2xl p-8 border border-white/40 relative z-10"
    >
      <!-- Header -->
      <h1 class="text-3xl font-bold text-center text-sky-700 mb-2">
        Weather Forecast App
      </h1>

      <p class="text-center text-gray-500 mb-6">
        Accurate and real-time weather updates
      </p>
      <!-- Search Section -->
      <div class="mb-6 relative">
        <div class="flex flex-col sm:flex-row gap-3">
          <div class="relative flex-1">
            <input
              id="cityInput"
              type="text"
              placeholder="Enter city name..."
              class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-sky-400"
            />

            <!-- Suggestions -->
            <ul
              id="suggestions"
              class="absolute left-0 right-0 bg-white border border-gray-300 rounded-lg mt-1 hidden z-20 shadow-md"
            ></ul>
          </div>

          <button
            id="searchBtn"
            class="bg-sky-500 hover:bg-sky-600 text-white px-4 py-2 rounded-lg transition"
          >
            Search
          </button>

          <button
            id="locationBtn"
            class="bg-indigo-500 hover:bg-indigo-600 text-white px-4 py-2 rounded-lg transition"
          >
            My Location
          </button>
        </div>
      </div>
      <!-- Error Message -->
      <div
        id="errorBox"
        class="hidden bg-red-500 text-white p-3 rounded-lg mb-4 text-center"
      ></div>

      <!-- Loading -->
      <div id="loading" class="hidden text-center mb-4 text-gray-500">
        <p>Fetching weather data...</p>
      </div>

      <!-- Today's Weather -->
      <div
        id="tempAlert"
        class="hidden bg-red-600 text-white p-3 rounded-lg mb-4 text-center font-semibold"
      ></div>
      <div
        id="todayWeather"
        class="bg-sky-50 rounded-xl p-6 mb-6 text-center hidden shadow-md"
      >
        <h2 id="cityName" class="text-2xl font-semibold text-sky-700"></h2>
        <img id="weatherIcon" class="mx-auto my-3 w-16 h-16" />
        <p id="temperature" class="text-4xl font-bold text-indigo-600 my-2"></p>
        <div class="mt-2">
          <button
            id="unitToggle"
            class="text-sm bg-indigo-500 hover:bg-indigo-600 text-white px-3 py-1 rounded-lg transition"
          >
            Switch to °F
          </button>
        </div>

        <p id="description" class="text-gray-600"></p>
        <p id="humidity" class="text-gray-500"></p>
        <p id="wind" class="text-gray-500"></p>
      </div>

      <!-- 5 Day Forecast -->
      <div>
        <h2 class="text-xl font-semibold mb-4 text-gray-700">5-Day Forecast</h2>
        <div
          id="forecastContainer"
          class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-5 gap-4"
        ></div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
